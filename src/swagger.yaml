openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0

paths:
  /items:
    get:
      summary: Get all items
      responses:
        200:
          description: OK

    post:
      summary: Create item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        201:
          description: Created

  /items/{id}:
    put:
      summary: Update item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Updated Item
      responses:
        200:
          description: Updated
    delete:
      summary: Delete an item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Deleted